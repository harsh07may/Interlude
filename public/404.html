<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Interlude</title>
    <script>
      // SPA redirect for GitHub Pages.
      // Encodes the requested path as a query string so index.html can restore it.
      // segmentCount = 1 matches the single "/Interlude" path segment in the base URL.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
